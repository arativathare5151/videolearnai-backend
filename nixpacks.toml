# =============================================================
#  nixpacks.toml  –  Railway build configuration
#  This installs FFmpeg on the Railway server automatically.
# =============================================================

[phases.setup]
nixPkgs = ["ffmpeg", "python311"]   # install ffmpeg + Python 3.11

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"